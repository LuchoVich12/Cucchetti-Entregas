<body>

    <main class="contacto container my-5">
        <section class="seccion-contacto">
            <h1 class="text-center">Contacto</h1>
            <h2 class="text-center">¿Tiene alguna consulta?</h2>
            <p class="text-center">Déjenos su mensaje:</p>

            <form class="row g-3">
                <div class="col-md-6">
                    <label for="nombre" class="form-label">Nombre</label>
                    <input type="text" id="nombre" class="form-control">
                </div>

                <div class="col-md-6">
                    <label for="apellido" class="form-label">Apellido</label>
                    <input type="text" id="apellido" class="form-control">
                </div>

                <div class="col-md-6">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" class="form-control">
                </div>

                <div class="col-md-6">
                    <label for="empresa" class="form-label">Empresa</label>
                    <input type="text" id="empresa" class="form-control" placeholder="Ingrese su empresa">
                </div>

                <div class="col-12">
                    <label for="mensaje" class="form-label">Mensaje</label>
                    <textarea id="mensaje" class="form-control" rows="5"></textarea>
                </div>

                <div class="col-12">
                    <button type="submit" class="btn btn-warning">Enviar</button>
                </div>
            </form>
        </section>
        </div>
    </main>
